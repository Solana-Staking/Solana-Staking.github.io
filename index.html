<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solana Staking - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Solana Staking DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://solana-staking.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root{
  --bg:#F7F3EC;
  --surface:#FFFCF7;
  --surface-2:#F1ECE3;
  --ink:#171411;
  --muted:#6F685F;
  --soft:#A49B8F;
  --line:rgba(23,20,17,.10);
  --line-strong:rgba(23,20,17,.16);
  --accent:#9945FF;
  --accent-soft:rgba(153,69,255,.11);
  --shadow:0 28px 70px -38px rgba(44,35,25,.42);
}

*{box-sizing:border-box}
html{height:100%;overflow:hidden}
body{
  margin:0;
  width:100%;
  height:100dvh;
  overflow:hidden;
  color:var(--ink);
  background:
    radial-gradient(58% 44% at 50% -10%, rgba(153,69,255,.13), transparent 62%),
    linear-gradient(180deg, #FBF8F2 0%, var(--bg) 100%);
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
}

a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
h1,p{margin:0}

.topbar{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:18px;
  padding:18px clamp(18px,4vw,42px) 12px;
}

.brand{
  display:inline-flex;
  align-items:center;
  gap:10px;
  min-width:0;
  color:var(--ink);
  font-size:1.03rem;
  font-weight:750;
  letter-spacing:0;
  white-space:nowrap;
}

.brand img{
  flex:0 0 auto;
  width:30px;
  height:30px;
  border-radius:50%;
  box-shadow:0 0 0 1px rgba(23,20,17,.08);
}

.nav{
  display:flex;
  align-items:center;
  gap:24px;
  margin-left:10px;
}

.nav a{
  color:var(--muted);
  font-size:.91rem;
  font-weight:550;
  transition:color .16s ease;
  white-space:nowrap;
}

.nav a:hover{color:var(--ink)}
.spacer{flex:1 1 auto}

.ghost{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:0 17px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  background:rgba(255,252,247,.62);
  color:var(--ink);
  font-size:.91rem;
  font-weight:700;
  box-shadow:0 10px 28px -24px rgba(23,20,17,.52);
  transition:transform .16s ease, border-color .16s ease, background .16s ease;
  white-space:nowrap;
}

.ghost:hover{
  transform:translateY(-1px);
  border-color:rgba(153,69,255,.38);
  background:#fff;
}

.stage{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:28px;
  padding:10px clamp(18px,4vw,42px) 8px;
  text-align:center;
}

.hero{
  display:grid;
  justify-items:center;
  gap:14px;
}

h1{
  max-width:12ch;
  font-size:clamp(3rem,7vw,5.35rem);
  line-height:1.02;
  font-weight:800;
  letter-spacing:0;
}

.value{
  max-width:58ch;
  color:var(--muted);
  font-size:clamp(1rem,1.65vw,1.18rem);
  font-weight:500;
}

.value strong{
  color:var(--ink);
  font-weight:760;
  box-shadow:inset 0 -.44em 0 var(--accent-soft);
}

.stake-card{
  width:min(430px,100%);
  padding:21px;
  border:1px solid var(--line);
  border-radius:20px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,252,247,.96)),
    var(--surface);
  box-shadow:var(--shadow);
}

.asset{
  display:flex;
  align-items:center;
  gap:14px;
  min-width:0;
  text-align:left;
}

.coin{
  flex:0 0 auto;
  width:58px;
  height:58px;
  display:grid;
  place-items:center;
  border-radius:18px;
  background:var(--surface-2);
  border:1px solid var(--line);
}

.coin img{
  width:42px;
  height:42px;
  border-radius:50%;
}

.asset-copy{
  min-width:0;
  display:grid;
  gap:2px;
}

.asset-kicker{
  color:var(--soft);
  font-size:.75rem;
  font-weight:780;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.asset-title{
  color:var(--ink);
  font-size:1.15rem;
  font-weight:780;
  letter-spacing:0;
}

.divider{
  height:1px;
  margin:18px 0 15px;
  background:linear-gradient(90deg, transparent, var(--line-strong), transparent);
}

.hint{
  color:var(--soft);
  font-size:.88rem;
  font-weight:560;
}

.primary{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:54px;
  margin-top:14px;
  border-radius:15px;
  background:var(--accent);
  color:#fff;
  font-size:1.02rem;
  font-weight:820;
  box-shadow:0 18px 34px -24px rgba(153,69,255,.72);
  transition:transform .16s ease, filter .16s ease, box-shadow .16s ease;
}

.primary:hover{
  transform:translateY(-1px);
  filter:saturate(1.05) brightness(1.02);
  box-shadow:0 22px 40px -23px rgba(153,69,255,.82);
}

.foot{
  flex:0 0 auto;
  padding:12px 18px 22px;
  color:var(--soft);
  text-align:center;
  font-size:.84rem;
  font-weight:600;
}

@media(max-width:700px){
  .topbar{
    gap:12px;
    padding:15px 16px 8px;
  }

  .brand{
    font-size:.96rem;
  }

  .brand img{
    width:28px;
    height:28px;
  }

  .nav{
    position:absolute;
    width:1px;
    height:1px;
    overflow:hidden;
    clip:rect(0 0 0 0);
    white-space:nowrap;
  }

  .ghost{
    min-height:36px;
    padding:0 13px;
    font-size:.86rem;
  }

  .stage{
    gap:22px;
    padding:8px 16px 6px;
  }

  h1{
    font-size:clamp(2.62rem,13vw,3.45rem);
  }

  .value{
    max-width:33ch;
    font-size:.99rem;
  }

  .stake-card{
    width:min(100%,390px);
    padding:18px;
    border-radius:18px;
  }

  .coin{
    width:54px;
    height:54px;
    border-radius:16px;
  }

  .asset-title{
    font-size:1.06rem;
  }

  .foot{
    padding:9px 16px 16px;
  }
}

@media(max-width:390px){
  .topbar{gap:9px}
  .brand span{max-width:142px;overflow:hidden;text-overflow:ellipsis}
  .ghost{padding:0 11px}
  .value{font-size:.96rem}
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Solana Staking</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Solana Staking</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Solana Staking &mdash; 2026</footer>
</body>
</html>
